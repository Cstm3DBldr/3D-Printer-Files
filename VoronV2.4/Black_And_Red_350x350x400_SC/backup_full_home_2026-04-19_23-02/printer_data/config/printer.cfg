##--------------------------------------------------------------------
## Intial Setup Of Printer
## Check Endstops Function
## QUERY_ENDSTOPS
##
## Test Probe
## TOOL_CALIBRATE_QUERY_PROBE
##
## Check Motors Are In Correct Ports
## STEPPER_BUZZ STEPPER=stepper_x
##
## Calibrate Heaters
## PID_CALIBRATE HEATER=extruder TARGET=255
## PID_CALIBRATE HEATER=heater_bed TARGET=90
## 
##
## Place Tool Over Sensor
## G1 X230 Y342 Z10 F4000            # sensor location 
##
## https://github.com/viesturz/NozzleAlign
## Load T0 calibrate nozzle location for tool 0.
## Place Nozzle Over Sensor
## G1 X230 Y342 Z10 F4000             # sensor location 
## TOOL_LOCATE_SENSOR
##
## Must Clear Gcode offsets First
## SET_GCODE_OFFSET X=0.0 Y=0.0 Z=0.0
## 
## Run For Each Tool Once Tool_locate for T0 has been Run
## G1 X230 Y342 Z10 F4000             # sensor location 
## TOOL_CALIBRATE_TOOL_OFFSET
##
## APPLY_AND_SAVE_NEW_CALIBRATION_OFFSETS
##
## Move Tool Head To Center Of Bed
## G1 X175 Y175 Z10 F4000 
##
## Calibrate Bed Mesh
## BED_MESH_CALIBRATE PROFILE=default METHOD=automatic
##
## TEST_RESONANCES AXIS=Y
## TEST_RESONANCES AXIS=X
## SSH Into Pi Use These Commands
## ~/klipper/scripts/calibrate_shaper.py /tmp/resonances_x_*.csv -o /tmp/shaper_calibrate_x.png
## ~/klipper/scripts/calibrate_shaper.py /tmp/resonances_y_*.csv -o /tmp/shaper_calibrate_y.png


[printer]
kinematics: corexy
max_velocity: 450
max_accel: 20000		#Max 4000
max_z_velocity:  450  #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 400
square_corner_velocity: 10

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on MOTOR0(B Motor)
[stepper_x]
step_pin: PE6
dir_pin: !PE5
enable_pin: !PC14
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 200 for 1.8 degree stepper
endstop_pin: ^PF4   
position_min: 0
##--------------------------------------------------------------------

##	Voron 350mm build
position_endstop: 350
position_max: 350
position_min: -0.1

##--------------------------------------------------------------------
homing_speed: 100   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc5160 stepper_x]
cs_pin: PC13
interpolate: True
run_current: 1.2
hold_current: 0.9
sense_resistor: 0.075
stealthchop_threshold: 0
spi_speed: 3500000
#spi_bus: spi1
spi_software_sclk_pin:PG8
spi_software_mosi_pin:PG6
spi_software_miso_pin:PG7

## Y Stepper on MOTOR1 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE4
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 200 for 1.8 degree stepper
endstop_pin: ^PF3
position_min: 0
##--------------------------------------------------------------------

##	Voron 350mm build
position_endstop: 350
position_max: 350
position_min: -0.1

##--------------------------------------------------------------------
homing_speed: 100 #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
